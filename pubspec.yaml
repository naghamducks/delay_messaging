name: delay_messenger
description: A DTN (Delay Tolerant Network) messaging application for offline-first communication

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.1.0
  permission_handler: ^11.3.1
  flutter_blue_plus: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  android_intent_plus: ^4.0.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
